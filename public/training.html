<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1c1917" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0c0a09" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Training Morse Kaito Whale">
  <title>Training Morse - Kaito Whale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    (function() {
      if (typeof tailwind === 'undefined') return;
      var cfg = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Figtree', 'system-ui', 'sans-serif'],
              display: ['Instrument Serif', 'Georgia', 'serif'],
            },
          },
        },
      };
      if (typeof tailwind.config === 'function') {
        tailwind.config(cfg);
      } else {
        tailwind.config = cfg;
      }
    })();
  </script>
  <style>
    body { background: #d4f7d4; color: #1c1917; margin: 0; min-height: 100vh; font-family: 'Figtree', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="min-h-screen bg-green-100 dark:bg-stone-900 text-stone-900 dark:text-stone-100 font-sans text-base antialiased transition-colors">
  <div class="w-full md:w-1/2 md:mx-auto min-h-screen flex flex-col px-4 pb-10 pt-6 simple-layout">
    <header class="flex justify-between items-center mb-4 relative">
      <div>
        <h1 class="font-display text-4xl text-stone-900 dark:text-stone-100 italic mb-2">Training Morse</h1>
        <div class="text-xs text-stone-500 dark:text-stone-400 mb-2">Kaito Whale</div>
      </div>
      <div class="flex items-center gap-2">
        <button id="darkModeToggle" class="p-3 rounded-xl bg-stone-200 dark:bg-stone-700 text-lg" aria-label="Toggle Dark Mode" title="Toggle Dark Mode">🌙</button>
        <a href="index.html" class="p-3 rounded-xl bg-stone-200 dark:bg-stone-700 text-lg" aria-label="Kembali" title="Kembali">⬅️ Kembali</a>
      </div>
    </header>
    <main>
      <div id="trainingContent" class="w-full"></div>
      <div id="trainingSetup" class="w-full"></div>
    </main>
  </div>
  <script>
    // Dark mode toggle logic
    const darkModeToggle = document.addEventListener ? document.getElementById('darkModeToggle') : null;
    function setDarkMode(enabled) {
      if (enabled) {
        document.documentElement.classList.add('dark');
        localStorage.setItem('darkMode', '1');
      } else {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('darkMode', '0');
      }
    }
    function getDarkModePref() {
      const ls = localStorage.getItem('darkMode');
      if (ls !== null) return ls === '1';
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    }
    // --- Training Mode Select ---
    const WORD_GROUPS = [
      { label: 'Basic Words', words: ['HI','OK','YES','NO','GO','STOP'] },
      { label: 'Common Words', words: ['HELP','WATER','FOOD','REST','PAIN','GOOD'] },
      { label: 'Emergency Words', words: ['SOS','URGENT','CALL','NEED','NOW','PLEASE'] },
    ];
    let selectedWords = [];
    function renderTrainingSetup() {
      const setup = document.getElementById('trainingSetup');
      if (!setup) return;
      let html = `<div class="max-w-lg mx-auto bg-stone-900 dark:bg-stone-900 text-white rounded-2xl p-6 mt-4 shadow-lg">
        <button onclick="window.location.href='index.html'" class="mb-4 text-left text-stone-400 hover:text-white">&larr; Back to Messages</button>
        <h2 class="text-2xl font-bold mb-2">Training Mode</h2>
        <div class="mb-2 text-stone-300">Select words for the user to practice</div>`;
      WORD_GROUPS.forEach(group => {
        html += `<div class="mt-4 mb-2 font-semibold text-stone-200">${group.label}</div><div class="flex flex-wrap gap-2 mb-2">`;
        group.words.forEach(word => {
          const active = selectedWords.includes(word) ? 'bg-stone-700 text-white' : 'bg-stone-800 text-stone-300';
          html += `<button type="button" class="px-4 py-2 rounded-xl font-bold text-base focus:outline-none ${active}" data-word="${word}">${word}</button>`;
        });
        html += `</div>`;
      });
      html += `<div class="mt-6 mb-2 font-semibold text-stone-200">Add Custom Word</div>
        <div class="flex gap-2 mb-4"><input id="customWordInput" type="text" class="flex-1 px-3 py-2 rounded-lg bg-stone-800 text-white border border-stone-700 focus:outline-none" placeholder="Type a word..." maxlength="20"><button id="addCustomWordBtn" class="px-4 py-2 rounded-xl bg-stone-700 text-white font-bold">Add</button></div>`;
      html += `<button id="startTrainingBtn" class="w-full py-3 rounded-xl bg-stone-700 text-stone-400 font-bold text-lg mt-2" disabled>Start Training (0 words)</button>`;
      html += `</div>`;
      setup.innerHTML = html;
      // Add listeners
      setup.querySelectorAll('button[data-word]').forEach(btn => {
        btn.onclick = function() {
          const w = btn.getAttribute('data-word');
          if (selectedWords.includes(w)) {
            selectedWords = selectedWords.filter(x => x !== w);
          } else {
            selectedWords.push(w);
          }
          // --- Training Mode Select ---
          // Ambil kosakata dari dictionary (features.js)
          const DICTIONARY_GROUPS = [
            { label: 'Konfirmasi', key: 'confirmation' },
            { label: 'Kebutuhan', key: 'needs' },
            { label: 'Kondisi', key: 'condition' },
            { label: 'Emosi', key: 'emotion' },
            { label: 'Bantuan', key: 'help' },
            { label: 'Interaksi', key: 'interaction' },
            { label: 'Waktu', key: 'time' },
          ];
          // Ambil data dictionary dari window (karena features.js sudah di-load di index.html)
          let TACTILE_DICTIONARY = window.TACTILE_DICTIONARY;
          if (!TACTILE_DICTIONARY) {
            // fallback jika belum ada, hardcode (minimal)
            TACTILE_DICTIONARY = {
              confirmation: [ { word: 'YA' }, { word: 'TIDAK' } ],
              needs: [ { word: 'MAKAN' }, { word: 'MINUM' } ],
              condition: [ { word: 'LAPAR' }, { word: 'SAKIT' } ],
              emotion: [ { word: 'SENANG' }, { word: 'SEDIH' } ],
              help: [ { word: 'TOLONG' }, { word: 'DARURAT' } ],
              interaction: [ { word: 'DENGARKAN' }, { word: 'TUNGGU' } ],
              time: [ { word: 'SEKARANG' }, { word: 'NANTI' } ],
            };
          }
          let selectedWords = [];
          function renderTrainingSetup() {
            const setup = document.getElementById('trainingSetup');
            if (!setup) return;
            let html = `<div class="max-w-lg mx-auto bg-stone-900 dark:bg-stone-900 text-white rounded-2xl p-6 mt-4 shadow-lg">
              <button onclick="window.location.href='index.html'" class="mb-4 text-left text-stone-400 hover:text-white">&larr; Kembali</button>
              <h2 class="text-2xl font-bold mb-2">Training Mode</h2>
              <div class="mb-2 text-stone-300">Pilih kata yang ingin dilatih</div>`;
            DICTIONARY_GROUPS.forEach(group => {
              const items = (TACTILE_DICTIONARY[group.key] || []);
              if (!items.length) return;
              html += `<div class="mt-4 mb-2 font-semibold text-stone-200">${group.label}</div><div class="flex flex-wrap gap-2 mb-2">`;
              items.forEach(item => {
                const word = item.word;
                const active = selectedWords.includes(word) ? 'bg-stone-700 text-white' : 'bg-stone-800 text-stone-300';
                html += `<button type="button" class="px-4 py-2 rounded-xl font-bold text-base focus:outline-none ${active}" data-word="${word}">${word}</button>`;
              });
              html += `</div>`;
            });
            html += `<div class="mt-6 mb-2 font-semibold text-stone-200">Tambah Kata Custom</div>
              <div class="flex gap-2 mb-4"><input id="customWordInput" type="text" class="flex-1 px-3 py-2 rounded-lg bg-stone-800 text-white border border-stone-700 focus:outline-none" placeholder="Ketik kata..." maxlength="20"><button id="addCustomWordBtn" class="px-4 py-2 rounded-xl bg-stone-700 text-white font-bold">Add</button></div>`;
            html += `<button id="startTrainingBtn" class="w-full py-3 rounded-xl bg-stone-700 text-stone-400 font-bold text-lg mt-2" disabled>Mulai Training (0 kata)</button>`;
            html += `</div>`;
            setup.innerHTML = html;
            // Add listeners
            setup.querySelectorAll('button[data-word]').forEach(btn => {
              btn.onclick = function() {
                const w = btn.getAttribute('data-word');
                if (selectedWords.includes(w)) {
                  selectedWords = selectedWords.filter(x => x !== w);
                } else {
                  selectedWords.push(w);
                }
                renderTrainingSetup();
              };
            });
            setup.querySelector('#addCustomWordBtn').onclick = function() {
              const inp = setup.querySelector('#customWordInput');
              const val = (inp.value || '').trim().toUpperCase();
              if (val && !selectedWords.includes(val)) {
                selectedWords.push(val);
                inp.value = '';
                renderTrainingSetup();
              }
            };
            const startBtn = setup.querySelector('#startTrainingBtn');
            if (selectedWords.length > 0) {
              startBtn.disabled = false;
              startBtn.classList.remove('text-stone-400','bg-stone-700');
              startBtn.classList.add('text-white','bg-emerald-700','hover:bg-emerald-800');
              startBtn.textContent = `Mulai Training (${selectedWords.length} kata)`;
            } else {
              startBtn.disabled = true;
              startBtn.classList.add('text-stone-400','bg-stone-700');
              startBtn.classList.remove('text-white','bg-emerald-700','hover:bg-emerald-800');
              startBtn.textContent = 'Mulai Training (0 kata)';
            }
            startBtn.onclick = function() {
              if (selectedWords.length > 0) {
                setup.style.display = 'none';
                startTraining(selectedWords);
              }
            };
          }
      const content = document.getElementById('trainingContent');
      if (!content) return;
      if (trainingState.current >= trainingState.words.length) {
        const time = Math.round((Date.now() - trainingState.startTime) / 1000);
        const acc = trainingState.total ? Math.round(100 * trainingState.correct / trainingState.total) : 0;
        content.innerHTML = `
          <div class="text-center mb-4">
            <div class="text-lg font-bold mb-2">Selesai!</div>
            <div class="text-2xl font-bold text-emerald-700 dark:text-emerald-400">${acc}%</div>
            <div class="text-base mb-2">Akurasi</div>
            <div class="text-base">Waktu: ${time} detik</div>
          </div>
          <a href="index.html" class="w-full block py-3 rounded-xl bg-red-200 dark:bg-red-700 text-red-900 dark:text-white font-bold mt-2 text-center">Tutup</a>
        `;
        return;
      }
      const word = trainingState.words[trainingState.current];
      const letters = word.replace(/[^A-Z]/gi,'').toUpperCase().split('');
      const morsePattern = letters.map(l => MORSE_MAP[l] || '').join(' ');
      let html = `<div class="text-center mb-2">
        <div class="text-xs text-stone-500 mb-1">Current word</div>
        <div class="text-2xl font-bold mb-2 tracking-widest">${word}</div>
        <div class="text-xs text-stone-500 mb-1">Morse Pattern</div>
        <div class="rounded-lg bg-stone-100 dark:bg-stone-700 py-2 px-4 mb-2 font-mono text-lg tracking-widest">${morsePattern}</div>
      </div>`;
      html += `<div class="flex flex-wrap justify-center gap-2 mb-4">`;
      letters.forEach((l, i) => {
        html += `<div class="flex flex-col items-center">
          <div class="text-xs font-bold mb-1">${l}</div>
          <input type="text" maxlength="5" data-idx="${i}" class="morse-input w-16 px-2 py-1 rounded-lg border border-stone-300 dark:border-stone-600 bg-white dark:bg-stone-800 text-stone-900 dark:text-stone-100 text-center font-mono text-lg" placeholder=". -" autocomplete="off" spellcheck="false">
        </div>`;
      });
      html += `</div>`;
      html += `<div class="flex gap-2 w-full mt-2">
        <button id="skipWordBtn" class="flex-1 py-3 rounded-xl bg-red-200 dark:bg-red-700 text-red-900 dark:text-white font-bold">Skip</button>
        <button id="practiceWordBtn" class="flex-1 py-3 rounded-xl bg-emerald-200 dark:bg-emerald-700 text-emerald-900 dark:text-white font-bold">Practice</button>
      </div>`;
      content.innerHTML = html;
      document.getElementById('skipWordBtn').onclick = () => {
        trainingState.current++;
        showTrainingWord();
      };
      document.getElementById('practiceWordBtn').onclick = () => checkTrainingWord(letters);
    }
    function checkTrainingWord(letters) {
      const inputs = Array.from(document.querySelectorAll('.morse-input'));
      let correct = 0;
      let total = letters.length;
      let feedback = '';
      inputs.forEach((inp, i) => {
        const val = (inp.value || '').replace(/\s+/g,'');
        const expected = (MORSE_MAP[letters[i]] || '').replace(/\s+/g,'');
        if (val === expected) {
          feedback += `<span class="inline-block w-10 h-10 rounded-full bg-emerald-400 text-white font-bold text-lg text-center leading-10 mx-1">${letters[i]}</span>`;
          inp.style.background = '#bbf7d0';
          correct++;
        } else {
          feedback += `<span class="inline-block w-10 h-10 rounded-full bg-red-300 text-white font-bold text-lg text-center leading-10 mx-1">${letters[i]}</span>`;
          inp.style.background = '#fecaca';
        }
        inp.disabled = true;
      });
      trainingState.correct += correct;
      trainingState.total += total;
      const content = document.getElementById('trainingContent');
      content.innerHTML = `
        <div class="text-center mb-2">
          <div class="text-xs text-stone-500 mb-1">Letter Morse</div>
          <div class="flex flex-wrap justify-center gap-2 mb-4">${feedback}</div>
        </div>
        <div class="flex gap-2 w-full mt-2">
          <a href="index.html" class="flex-1 py-3 rounded-xl bg-red-200 dark:bg-red-700 text-red-900 dark:text-white font-bold text-center">Quit Practice</a>
          <button id="nextWordBtn" class="flex-1 py-3 rounded-xl bg-emerald-200 dark:bg-emerald-700 text-emerald-900 dark:text-white font-bold">Next</button>
        </div>
        <div class="text-center text-xs text-stone-500 mt-2">Akurasi: ${Math.round(100*trainingState.correct/trainingState.total)}% &middot; Waktu: ${Math.round((Date.now()-trainingState.startTime)/1000)}s</div>
      `;
      document.getElementById('nextWordBtn').onclick = () => {
        trainingState.current++;
        showTrainingWord();
      };
    }
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('trainingContent').innerHTML = '';
      renderTrainingSetup();
    });
  </script>
</body>
</html>
